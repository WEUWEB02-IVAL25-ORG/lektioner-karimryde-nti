<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameloopen</title>
    <style>
        body {
            background-color: #555;
            padding: 0;
            margin: 0;
        }

        canvas {
            background-color: #000000;
        }
    </style>
</head>
<body>
    <canvas width="800" height="600"></canvas>
    <script>
        const canvas = document.querySelector('canvas')
        const ctx = canvas.getContext('2d')

        // Ladda in bilden av rymskeppet
        const ship = new Image()
        ship.src = "./battleship.png"

        // Ladda in bild av fiende 1
        const enemy1 = new Image()
        enemy1.src = "./ufo.png"
        // Ladda in bild av fiende 2
        const enemy2 = new Image()
        enemy2.src = "./alien.png"
        // Ladda in bild av fiende 3
        const enemy3 = new Image()
        enemy3.src = "./monster.png"
        // Ladda in bild på en explosion
        const blast = new Image()
        blast.src = "./blast.png"

        // Ladda in skottljud
        const lazerShot = new Audio()
        lazerShot.src = "./lazer-shot.wav"
        // Ladda in explosionsljud
        const explosion = new Audio()
        explosion.src = "./explosion13.wav"

        // Variabler
        let shipX = 400 - 32
        let shipY = 300
        let directionH = ""
        let directionV = ""
        let shooting = false
        let blastTimer = 0
        let blastX = 0
        let blastY = 0
        let enemy1X = 750 * Math.random()
        let enemy1Y = -100 * Math.random()
        let enemy1Speed = 5 * Math.random() + 1
        let enemy2X = 750 * Math.random()
        let enemy2Y = -100 * Math.random()
        let enemy2Speed = 5 * Math.random() + 1
        let enemy3X = 750 * Math.random()
        let enemy3Y = -100 * Math.random()
        let enemy3Speed = 5 * Math.random() + 1

        // Lyssna på tangeter: pil-vänster/pil-höger
        window.addEventListener('keydown', function (e) {
            if (e.code == 'ArrowRight') {
                directionH = "R"
            }
            if (e.code == 'ArrowLeft') {
                directionH = "L"
            }
            if (e.code == 'ArrowUp') {
                directionV = "U"
            }
            if (e.code == 'ArrowDown') {
                directionV = "D"
            }
            if (e.code == 'Space') {
                shooting = true
            }
        })
        window.addEventListener('keyup', function (e) {
            if (e.code == 'ArrowRight') {
                directionH = ""
            }
            if (e.code == 'ArrowLeft') {
                directionH = ""
            }
            if (e.code == 'ArrowUp') {
                directionV = ""
            }
            if (e.code == 'ArrowDown') {
                directionV = ""
            }
            if (e.code == 'Space') {
                shooting = false
            }
        })

        // Animationsloopen
        function gameLoop() {
            // Radera canvas
            ctx.clearRect(0, 0, 800, 600)

            motion()
            border()
            stars()
            laser()
            rocketFlame()
            spaceship()
            enemies()
            drawBlast()

            // Upprepa
            requestAnimationFrame(gameLoop)
        }
        gameLoop()

        // Rita ut fiender
        function enemies() {
            ctx.drawImage(enemy1, enemy1X, enemy1Y)
            enemy1Y += enemy1Speed
            ctx.drawImage(enemy2, enemy2X, enemy2Y)
            enemy2Y += enemy2Speed
            ctx.drawImage(enemy3, enemy3X, enemy3Y)
            enemy3Y += enemy3Speed

            // Respawn fienden lämnar scenen
            if (enemy1Y > 600) {
                enemy1X = 750 * Math.random()
                enemy1Y = -100 * Math.random()
            }
            if (enemy2Y > 600) {
                enemy2X = 750 * Math.random()
                enemy2Y = -100 * Math.random()
            }
            if (enemy3Y > 600) {
                enemy3X = 750 * Math.random()
                enemy3Y = -100 * Math.random()
            }
        }

        function motion() {
            if (directionH == "R") {
                shipX += 5
            }
            if (directionH == "L") {
                shipX -= 5
            }
            if (directionV == "D") {
                shipY += 5
            }
            if (directionV == "U") {
                shipY -= 5
            }
        }

        function border() {
            if (shipX > 800) {
                shipX = 0
            }
            if (shipX < 0) {
                shipX = 800
            }
        }

        // Rita ut rymdskeppet
        function spaceship() {
            ctx.drawImage(ship, shipX, shipY)
        }

        function rocketFlame() {
            ctx.beginPath()
            ctx.moveTo(shipX + 28, shipY + 50)
            ctx.lineTo(shipX + 20, shipY + 70)
            ctx.lineTo(shipX + 32, shipY + 70 + Math.random() * 30)
            ctx.lineTo(shipX + 42, shipY + 70)
            ctx.lineTo(shipX + 36, shipY + 50)
            ctx.fillStyle = "orange"
            ctx.fill()
        }

        function laser() {
            if (shooting) {
                lazerShot.play()
                ctx.fillStyle = "white"
                ctx.fillRect(shipX + 31, 0, 2, shipY)

                // Kolla om skott träffar enemy1
                if (shipX + 32 >= enemy1X && shipX + 32 <= enemy1X + 64 && enemy1Y < shipY) {
                    explosion.play()
                    blastTimer = 20
                    blastX = enemy1X
                    blastY = enemy1Y
                    enemy1X = 750 * Math.random()
                    enemy1Y = -100 * Math.random()
                }
                // Kolla om skott träffar enemy2
                if (shipX + 32 >= enemy2X && shipX + 32 <= enemy2X + 64 && enemy2Y < shipY) {
                    explosion.play()
                    blastTimer = 20
                    blastX = enemy2X
                    blastY = enemy2Y
                    enemy2X = 750 * Math.random()
                    enemy2Y = -100 * Math.random()
                }
                // Kolla om skott träffar enemy3
                if (shipX + 32 >= enemy3X && shipX + 32 <= enemy3X + 64 && enemy3Y < shipY) {
                    explosion.play()
                    blastTimer = 20
                    blastX = enemy3X
                    blastY = enemy3Y
                    enemy3X = 750 * Math.random()
                    enemy3Y = -100 * Math.random()
                }
            }
        }

        function drawBlast() {
            if (blastTimer > 0) {
                ctx.drawImage(blast, blastX, blastY)
                blastTimer--
            }
        }

        function stars() {
            ctx.fillStyle = "white"
            ctx.fillRect(200, 150, 3, 3)
            ctx.fillRect(20, 150, 4, 4)
            ctx.fillRect(400, 250, 3, 3)
            ctx.fillRect(700, 50, 4, 4)
            ctx.fillRect(100, 450, 3, 3)
            ctx.fillRect(120, 350, 3, 3)
            ctx.fillRect(400, 650, 3, 3)
            ctx.fillRect(600, 500, 3, 3)
            ctx.fillRect(200, 50, 3, 3)
            ctx.fillRect(20, 350, 3, 3)
            ctx.fillRect(400, 550, 3, 3)
            ctx.fillRect(500, 150, 4, 4)
            ctx.fillRect(100, 150, 2, 2)
            ctx.fillRect(720, 650, 4, 4)
            ctx.fillRect(400, 350, 3, 3)
            ctx.fillRect(500, 700, 2, 2)
        }

        // Ennemies
    </script>
</body>
</html>
