<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameloopen</title>
    <style>
        body {
            background-color: #555;
            padding: 20px;
        }

        canvas {
            background-color: #000000;
        }
    </style>
</head>
<body>
    <canvas width="800" height="600"></canvas>
    <script>
        const canvas = document.querySelector('canvas')
        const ctx = canvas.getContext('2d')

        // Ladda in bilden av rymskeppet
        const ship = new Image()
        ship.src = "./battleship.png"

        // Variabler
        let shipX = 400 - 32
        let shipY = 300
        let directionH = ""
        let directionV = ""
        let shooting = false

        // Lyssna på tangeter: pil-vänster/pil-höger
        window.addEventListener('keydown', function (e) {
            if (e.code == 'ArrowRight') {
                directionH = "R"
            }
            if (e.code == 'ArrowLeft') {
                directionH = "L"
            }
            if (e.code == 'ArrowUp') {
                directionV = "U"
            }
            if (e.code == 'ArrowDown') {
                directionV = "D"
            }
            if (e.code == 'Space') {
                shooting = true
            }
        })
        window.addEventListener('keyup', function (e) {
            if (e.code == 'ArrowRight') {
                directionH = ""
            }
            if (e.code == 'ArrowLeft') {
                directionH = ""
            }
            if (e.code == 'ArrowUp') {
                directionV = ""
            }
            if (e.code == 'ArrowDown') {
                directionV = ""
            }
            if (e.code == 'Space') {
                shooting = false
            }
        })

        // Animationsloopen
        function gameLoop() {
            // Radera canvas
            ctx.clearRect(0, 0, 800, 600)

            motion()
            border()
            stars()
            laser()
            rocketFlame()
            spaceship()

            // Upprepa
            requestAnimationFrame(gameLoop)
        }
        gameLoop()

        function motion() {
            if (directionH == "R") {
                shipX += 5
            }
            if (directionH == "L") {
                shipX -= 5
            }
            if (directionV == "D") {
                shipY += 5
            }
            if (directionV == "U") {
                shipY -= 5
            }
        }

        function border() {
            if (shipX > 800) {
                shipX = 0
            }
            if (shipX < 0) {
                shipX = 800
            }
        }

        // Rita ut rymdskeppet
        function spaceship() {
            ctx.drawImage(ship, shipX, shipY)
        }

        function rocketFlame() {
            ctx.beginPath()
            ctx.moveTo(shipX + 28, shipY + 50)
            ctx.lineTo(shipX + 20, shipY + 70)
            ctx.lineTo(shipX + 32, shipY + 70 + Math.random() * 30)
            ctx.lineTo(shipX + 42, shipY + 70)
            ctx.lineTo(shipX + 36, shipY + 50)
            ctx.fillStyle = "orange"
            ctx.fill()
        }

        function laser() {
            if (shooting) {
                ctx.fillStyle = "white"
                ctx.fillRect(shipX + 31, 0, 2, shipY)
            }
        }

        function stars() {
            ctx.fillStyle = "white"
            ctx.fillRect(200, 150, 3, 3)
            ctx.fillRect(20, 150, 4, 4)
            ctx.fillRect(400, 250, 3, 3)
            ctx.fillRect(700, 50, 4, 4)
            ctx.fillRect(100, 450, 3, 3)
            ctx.fillRect(120, 350, 3, 3)
            ctx.fillRect(400, 650, 3, 3)
            ctx.fillRect(600, 500, 3, 3)
            ctx.fillRect(200, 50, 3, 3)
            ctx.fillRect(20, 350, 3, 3)
            ctx.fillRect(400, 550, 3, 3)
            ctx.fillRect(500, 150, 4, 4)
            ctx.fillRect(100, 150, 2, 2)
            ctx.fillRect(720, 650, 4, 4)
            ctx.fillRect(400, 350, 3, 3)
            ctx.fillRect(500, 700, 2, 2)
        }
    </script>
</body>
</html>
